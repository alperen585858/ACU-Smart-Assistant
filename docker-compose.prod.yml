# Üretim imajları (Dockerfile.prod) + PostgreSQL (pgvector) + Ollama + Nginx.
# Hazırlık: cp deploy/env.production.example .env.production && düzenle (SECRET_KEY, şifreler, ALLOWED_HOSTS, …)
# Çalıştır: docker compose -f docker-compose.prod.yml up -d --build
#
# Ollama ilk açılışta model çeker; sunucuda yeterli RAM/disk gerekir (~8 GB+ RAM önerilir).
# İlk kurulumda bir kez migrate: RUN_MIGRATIONS=1 docker compose -f docker-compose.prod.yml up -d backend
# Harici RDS / uzaktaki Ollama: bu dosyada db veya ollama servisini kaldırıp PROJECT/.env ile
# POSTGRES_HOST ve OLLAMA_BASE_URL tanımlayın (compose interpolasyonu PROJECT/.env dosyasını okur).

services:
  ollama:
    image: ollama/ollama:latest
    container_name: acu-chatbot-ollama-prod
    entrypoint: ["/bin/sh", "/ollama-entrypoint.sh"]
    command: []
    environment:
      OLLAMA_PULL_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - ollama_data_prod:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    networks:
      - acu_prod
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg15
    container_name: acu-chatbot-db-prod
    env_file:
      - .env.production
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - acu_prod
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: acu-chatbot-backend-prod
    env_file:
      - .env.production
    environment:
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-0}
      # 1: DB'de RAG yokken bir kez refresh_rag (sınırsız sayfa, HTTP-only; bkz. init_rag_if_empty)
      AUTO_RAG_WHEN_EMPTY: ${AUTO_RAG_WHEN_EMPTY:-1}
      # POSTGRES_* kullanıcı/şifre/db adı: .env.production (db servisi ile aynı dosya)
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - acu_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Compose bu değeri kök dizindeki .env veya ortamdan okur (bkz. deploy/README.md).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: acu-chatbot-frontend-prod
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - acu_prod

  nginx:
    image: nginx:1.27-alpine
    container_name: acu-chatbot-proxy-prod
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - acu_prod

networks:
  acu_prod:
    driver: bridge

# pgdata_prod: RAG (Page, DocumentChunk) + Django verisi; silinmedikce her deploy sonrasi da kalir.
# ollama_data_prod: indirilen LLM imajlari.
volumes:
  pgdata_prod:
  ollama_data_prod:
