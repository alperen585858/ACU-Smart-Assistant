apiVersion: apps/v1
kind: Deployment
metadata:
  name: acu-backend
  namespace: acu-smart-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acu-backend
  template:
    metadata:
      labels:
        app: acu-backend
    spec:
      containers:
        - name: backend
          image: acu-smart-assistant-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: acu-config
            - secretRef:
                name: acu-secrets
          command:
            - sh
            - -c
            - |
              python manage.py migrate --noinput &&
              gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

