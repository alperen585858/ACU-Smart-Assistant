apiVersion: apps/v1
kind: Deployment
metadata:
  name: acu-db
  namespace: acu-smart-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acu-db
  template:
    metadata:
      labels:
        app: acu-db
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15
          ports:
            - containerPort: 5432
              name: pgsql
          envFrom:
            - configMapRef:
                name: acu-config
            - secretRef:
                name: acu-secrets
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: acu-db-pvc

