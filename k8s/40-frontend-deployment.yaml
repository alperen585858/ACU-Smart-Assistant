apiVersion: apps/v1
kind: Deployment
metadata:
  name: acu-frontend
  namespace: acu-smart-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acu-frontend
  template:
    metadata:
      labels:
        app: acu-frontend
    spec:
      containers:
        - name: frontend
          image: acu-smart-assistant-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://localhost:8080"
            - name: WATCHPACK_POLLING
              value: "true"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

