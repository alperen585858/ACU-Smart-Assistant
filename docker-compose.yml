# Tek komut: docker compose up -d [--build]
# Mac’te ayrıca npm run dev / manage.py runserver çalıştırmanız gerekmez; Next.js bu dosyadaki
# frontend servisinin içinde otomatik başlar (Dockerfile: npm run dev).
#
# Nginx ile tek giriş: http://localhost:${NGINX_HOST_PORT:-8080} (Nginx → /api → Django, / → Next.js).
# Şimdilik proxy’yi başlatmayacaksanız: docker compose up -d db ollama backend frontend
# ve .env içinde NEXT_PUBLIC_API_URL=http://localhost:8000 (veya doğrudan 3000 + 8000 kullanın).
#
# Backend konteyneri Ollama’ya host .env içindeki OLLAMA_BASE_URL (127.0.0.1) ile gitmemeli.
# Varsayılan: http://ollama:11434. Özel durum: OLLAMA_DOCKER_URL=http://host.docker.internal:11434
#
# Servisler:
#   1) acu-chatbot-db       → PostgreSQL
#   2) acu-chatbot-ollama  → Ollama (llama3.2:3b; ilk açılışta indirir; Docker RAM ~8GB+ önerilir)
#   3) acu-chatbot-backend → Django
#   4) acu-chatbot-frontend→ Next.js (iç ağ; tarayıcı çoğunlukla Nginx üzerinden)
#   5) acu-chatbot-proxy   → Nginx reverse proxy (HTTP 80 → host’ta NGINX_HOST_PORT)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: acu-chatbot-ollama
    entrypoint: ["/bin/sh", "/ollama-entrypoint.sh"]
    command: []
    environment:
      OLLAMA_PULL_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    ports:
      - "11434:11434"
    networks:
      - acu_net
    restart: unless-stopped
    # ollama imajında curl olmayabiliyor; CLI sunucuya ping atar.
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: pgvector/pgvector:pg15
    container_name: acu-chatbot-db
    networks:
      - acu_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
    # Host’ta 5432 genelde meşgul (yerel PostgreSQL); makineden bağlanmak için 5433 kullanın.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acu} -d ${POSTGRES_DB:-acu_chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acu-chatbot-backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx}
      CSRF_TRUSTED_ORIGINS_EXTRA: ${CSRF_TRUSTED_ORIGINS_EXTRA:-http://localhost:8080,http://127.0.0.1:8080}
      OLLAMA_BASE_URL: ${OLLAMA_DOCKER_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-384}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_HTTP_TIMEOUT: ${OLLAMA_HTTP_TIMEOUT:-120}
      DEBUG: ${DEBUG:-true}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - acu_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acu-chatbot-frontend
    environment:
      # Nginx üzerinden tek origin: tarayıcı ve API aynı host:port (varsayılan 8080)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      WATCHPACK_POLLING: "true"
    ports:
      # 3000 bind hatası alırsanız Project/.env → FRONTEND_HOST_PORT=3001
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - acu_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: acu-chatbot-proxy
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - acu_net
    restart: unless-stopped

networks:
  acu_net:
    driver: bridge

volumes:
  pgdata:
  ollama_data:
  frontend_node_modules:
