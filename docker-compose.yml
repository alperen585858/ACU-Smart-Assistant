# Dört ana servis (docker compose up --build):
#   1) acu-chatbot-db       → PostgreSQL
#   2) acu-chatbot-ollama  → Ollama (phi3:mini; phi3:mini ~3.5 GiB+ RAM ister — Docker’da Memory artırın)
#   3) acu-chatbot-backend → Django
#   4) acu-chatbot-frontend→ Next.js

services:
  ollama:
    image: ollama/ollama:latest
    container_name: acu-chatbot-ollama
    entrypoint: ["/bin/sh", "/ollama-entrypoint.sh"]
    command: []
    environment:
      OLLAMA_PULL_MODEL: ${OLLAMA_MODEL:-phi3:mini}
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    ports:
      - "11434:11434"
    networks:
      - acu_net

  db:
    image: postgres:15-alpine
    container_name: acu-chatbot-db
    networks:
      - acu_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
    # Host’ta 5432 genelde meşgul (yerel PostgreSQL); makineden bağlanmak için 5433 kullanın.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acu} -d ${POSTGRES_DB:-acu_chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acu-chatbot-backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3:mini}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - acu_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acu-chatbot-frontend
    environment:
      # Tarayıcı → Django: BACKEND_HOST_PORT ile uyumlu olmalı (varsayılan 8000)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      # 3000 meşgulsa: FRONTEND_HOST_PORT=3001 veya .env’de ayarla; uygulama http://localhost:3001
      - "${FRONTEND_HOST_PORT:-3001}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - acu_net

networks:
  acu_net:
    driver: bridge

volumes:
  pgdata:
  ollama_data:
  frontend_node_modules:
