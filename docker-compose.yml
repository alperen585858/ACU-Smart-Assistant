# Üç ayrı container (tek compose dosyası sadece hepsini birlikte ayağa kaldırır):
#   1) acu-chatbot-db       → PostgreSQL (postgres:15-alpine)
#   2) acu-chatbot-backend → Django (./backend/Dockerfile)
#   3) acu-chatbot-frontend→ Next.js (./frontend/Dockerfile)
# Proje kökünden: docker compose up --build

services:
  db:
    image: postgres:15-alpine
    container_name: acu-chatbot-db
    networks:
      - acu_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acu} -d ${POSTGRES_DB:-acu_chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acu-chatbot-backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - acu_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acu-chatbot-frontend
    environment:
      # Tarayıcıdan erişim: makinenizde http://localhost:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - acu_net

networks:
  acu_net:
    driver: bridge

volumes:
  pgdata:
  frontend_node_modules:
