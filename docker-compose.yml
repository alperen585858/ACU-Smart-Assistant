# Tek komut: docker compose up -d [--build]
# Mac’te ayrıca npm run dev / manage.py runserver çalıştırmanız gerekmez; Next.js bu dosyadaki
# frontend servisinin içinde otomatik başlar (Dockerfile: npm run dev).
#
# Servisler:
#   1) acu-chatbot-db       → PostgreSQL
#   2) acu-chatbot-ollama  → Ollama (llama3.2:3b; ilk açılışta indirir; Docker RAM ~8GB+ önerilir)
#   3) acu-chatbot-backend → Django
#   4) acu-chatbot-frontend→ Next.js (tarayıcı: FRONTEND_HOST_PORT, varsayılan 3000; meşgulse .env’de 3001)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: acu-chatbot-ollama
    entrypoint: ["/bin/sh", "/ollama-entrypoint.sh"]
    command: []
    environment:
      OLLAMA_PULL_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    ports:
      - "11434:11434"
    networks:
      - acu_net
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg15
    container_name: acu-chatbot-db
    networks:
      - acu_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
    # Host’ta 5432 genelde meşgul (yerel PostgreSQL); makineden bağlanmak için 5433 kullanın.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acu} -d ${POSTGRES_DB:-acu_chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acu-chatbot-backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-384}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_HTTP_TIMEOUT: ${OLLAMA_HTTP_TIMEOUT:-120}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - acu_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acu-chatbot-frontend
    environment:
      # Tarayıcı → Django: BACKEND_HOST_PORT ile uyumlu olmalı (varsayılan 8000)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
    ports:
      # 3000 bind hatası alırsanız Project/.env → FRONTEND_HOST_PORT=3001
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - acu_net
    restart: unless-stopped

networks:
  acu_net:
    driver: bridge

volumes:
  pgdata:
  ollama_data:
  frontend_node_modules:
